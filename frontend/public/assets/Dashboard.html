<!DOCTYPE html>
<html>
<head>
    <title>Smart Home Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e0f7fa, #e8f5e9);
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #34495e;
        }

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .header {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

       
        .cards {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 200px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .card p {
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
        }

        
        .devices {
            margin-top: 30px;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        .device-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .device-item:last-child {
            border-bottom: none;
        }

        .status-on {
            color: green;
            font-weight: bold;
        }

        .status-off {
            color: red;
            font-weight: bold;
        }

        button {
            padding: 6px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            background-color: #3498db;
            color: white;
        }

        button:hover {
            background-color: #2980b9;
        }

    </style>
</head>

<body>


<div class="sidebar">
    <h2>Smart Home</h2>
    <a href="#">Dashboard</a>
    <a href="#">Devices</a>
    <a href="#">Energy Reports</a>
    <a href="#">Profile</a>
    <a href="#">Logout</a>
</div>

<div class="main">

    <div class="header">
        <h2>Welcome, User 👋</h2>
        <p>Monitor and manage your home energy efficiently.</p>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Total Energy Used</h3>
            <p>120 kWh</p>
        </div>

        <div class="card">
            <h3>Active Devices</h3>
            <p>4</p>
        </div>

        <div class="card">
            <h3>Monthly Bill</h3>
            <p>₹ 2,350</p>
        </div>
    </div>

    <div class="devices">
        <h3>Device Status</h3>

        <div class="device-item">
            <span>Air Conditioner</span>
            <span class="status-on">ON</span>
            <button>Toggle</button>
        </div>

        <div class="device-item">
            <span>Living Room Light</span>
            <span class="status-off">OFF</span>
            <button>Toggle</button>
        </div>

        <div class="device-item">
            <span>Ceiling Fan</span>
            <span class="status-on">ON</span>
            <button>Toggle</button>
        </div>

    </div>

</div>

</body>
</html>
